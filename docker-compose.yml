version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ubermench_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ubermench
      POSTGRES_PASSWORD: ubermench_dev
      POSTGRES_DB: ubermench_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ubermench_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

